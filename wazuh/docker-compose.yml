################################################################
# Wazuh single-node stack
# Wazuh Manager + Wazuh Indexer (OpenSearch) + Wazuh Dashboard
################################################################

services:

  # ── Wazuh Indexer (OpenSearch) ──────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:${WAZUH_VERSION:-4.11.2}
    container_name: wazuh-indexer
    hostname: wazuh-indexer
    restart: unless-stopped
    environment:
      OPENSEARCH_JAVA_OPTS: "-Xms${INDEXER_HEAP:-512m} -Xmx${INDEXER_HEAP:-512m}"
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh-indexer/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./config/wazuh-indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
      - ./config/certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem:ro
      - ./config/certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.pem:ro
      - ./config/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
    networks:
      - wazuh-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sku admin:${INDEXER_PASSWORD:-SecretPassword} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Wazuh Manager ────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:${WAZUH_VERSION:-4.11.2}
    container_name: wazuh-manager
    hostname: wazuh-manager
    restart: unless-stopped
    environment:
      WAZUH_API_USERNAME: ${WAZUH_API_USERNAME:-wazuh-wui}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD:-MyS3cr37P450r.*-}
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${INDEXER_PASSWORD:-SecretPassword}
      FILEBEAT_SSL_VERIFICATION_MODE: full
    volumes:
      - wazuh-manager-api:/var/ossec/api/configuration
      - wazuh-manager-etc:/var/ossec/etc
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-queue:/var/ossec/queue
      - wazuh-manager-var-multigroups:/var/ossec/var/multigroups
      - wazuh-manager-integrations:/var/ossec/integrations
      - wazuh-manager-active-response:/var/ossec/active-response/bin
      - wazuh-manager-agentless:/var/ossec/agentless
      - wazuh-manager-wodles:/var/ossec/wodles
      - wazuh-manager-filebeat:/etc/filebeat
      - ./config/wazuh-manager/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./config/certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./config/certs/wazuh-manager.pem:/etc/ssl/filebeat.pem:ro
      - ./config/certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key:ro
    ports:
      - "1514:1514/udp"   # Agent communication (syslog)
      - "1514:1514/tcp"   # Agent communication
      - "1515:1515"       # Agent enrollment
      - "514:514/udp"     # Syslog input
      - "55000:55000"     # Wazuh API
    networks:
      - wazuh-net
    depends_on:
      wazuh-indexer:
        condition: service_healthy

  # ── Wazuh Dashboard ──────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:${WAZUH_VERSION:-4.11.2}
    container_name: wazuh-dashboard
    hostname: wazuh-dashboard
    restart: unless-stopped
    environment:
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${INDEXER_PASSWORD:-SecretPassword}
      WAZUH_API_URL: https://wazuh-manager
      WAZUH_API_USERNAME: ${WAZUH_API_USERNAME:-wazuh-wui}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD:-MyS3cr37P450r.*-}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-kibanaserver}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-kibanaserver}
    volumes:
      - ./config/wazuh-dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./config/certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem:ro
      - ./config/certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem:ro
      - ./config/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
    ports:
      - "${DASHBOARD_PORT:-443}:5601"
    networks:
      - wazuh-net
    depends_on:
      wazuh-indexer:
        condition: service_healthy

networks:
  wazuh-net:
    name: wazuh-net

volumes:
  wazuh-indexer-data:
  wazuh-manager-api:
  wazuh-manager-etc:
  wazuh-manager-logs:
  wazuh-manager-queue:
  wazuh-manager-var-multigroups:
  wazuh-manager-integrations:
  wazuh-manager-active-response:
  wazuh-manager-agentless:
  wazuh-manager-wodles:
  wazuh-manager-filebeat:
